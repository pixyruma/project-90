<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT 90 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        /* Fix: pb-32 ensures content never hides behind the nav bar */
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 120px; }
        .tab-active { display: flex !important; }
        .nav-item { transition: all 0.3s ease; color: #64748b; }
        .nav-item.active { color: #a78bfa; filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5)); }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center border-b border-white/5 bg-slate-950/50">
        <div>
            <h1 class="text-xl font-black italic text-violet-500 uppercase tracking-tighter">Project 90</h1>
            <p id="current-date" class="text-[10px] font-bold text-slate-500 uppercase">March 22, 2026</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest leading-none">Weight</p>
            <p class="text-lg font-black text-white leading-tight">100.0<span class="text-[10px] ml-0.5 text-slate-500">kg</span></p>
        </div>
    </header>

    <main class="flex-1 overflow-hidden relative">
        
        <section id="tab-dash" class="tab-content tab-active p-5 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div onclick="showMealLog()" class="glass p-5 rounded-3xl active:scale-95 transition-all">
                    <i data-lucide="utensils" class="w-4 h-4 text-emerald-400 mb-2"></i>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Calories In</p>
                    <p class="text-2xl font-black text-emerald-400"><span id="dash-cals">0</span></p>
                </div>
                <div class="glass p-5 rounded-3xl">
                    <i data-lucide="flame" class="w-4 h-4 text-orange-400 mb-2"></i>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Burned</p>
                    <p class="text-2xl font-black text-orange-400"><span id="dash-burn">0</span></p>
                </div>
            </div>

            <div class="glass p-5 rounded-3xl h-64">
                <canvas id="statsChart"></canvas>
            </div>

            <div id="meal-history" class="hidden glass p-5 rounded-3xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black uppercase tracking-widest text-violet-400">Meal History</h3>
                    <button onclick="document.getElementById('meal-history').classList.add('hidden')"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div id="log-list" class="space-y-3"></div>
            </div>
        </section>

        <section id="tab-coach" class="tab-content flex-col h-full">
            <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-4 pb-20">
                <div class="glass p-4 rounded-2xl rounded-tl-none text-sm text-slate-300">Coach Gemini is active. Analyze a meal or update your plan here.</div>
            </div>
            
            <div class="fixed bottom-[85px] left-0 right-0 p-4 bg-slate-950/90 backdrop-blur-md border-t border-white/5 z-40">
                <div id="image-preview-container" class="hidden mb-3">
                    <div class="relative inline-block">
                        <img id="image-preview" src="" class="w-16 h-16 rounded-xl object-cover border-2 border-violet-500">
                        <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 rounded-full p-1"><i data-lucide="x" class="w-3 h-3 text-white"></i></button>
                    </div>
                </div>
                <div class="flex gap-2 max-w-md mx-auto">
                    <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(this)">
                    <button onclick="document.getElementById('image-input').click()" class="glass w-12 h-12 rounded-xl flex items-center justify-center"><i data-lucide="camera" class="w-6 h-6"></i></button>
                    <input id="user-input" type="text" placeholder="Message coach..." onkeypress="if(event.key==='Enter') askCoach()" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 text-sm focus:border-violet-500 outline-none">
                    <button onclick="askCoach()" class="bg-violet-600 w-12 h-12 rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i data-lucide="send" class="w-5 h-5 text-white"></i></button>
                </div>
            </div>
        </section>

        <section id="tab-workout" class="tab-content p-5 space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <i data-lucide="dumbbell" class="text-violet-400"></i>
                <h2 class="text-xl font-black italic uppercase tracking-tight">Today's Plan</h2>
            </div>
            <div class="glass p-6 rounded-3xl border-l-4 border-violet-500">
                <ul id="workout-list" class="space-y-4">
                    <li class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-violet-500"></div>
                        <span class="text-sm font-bold">15 min Fasted Walk</span>
                    </li>
                    <li class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full bg-violet-500"></div>
                        <span class="text-sm font-bold">4 Sets Pushups (to failure)</span>
                    </li>
                </ul>
            </div>
            <button onclick="switchTab('coach')" class="w-full py-4 glass rounded-2xl text-[10px] font-black uppercase tracking-widest text-violet-400 active:bg-white/5">Adjust with Coach AI</button>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-4 pb-8 flex justify-around items-center z-50">
        <button onclick="switchTab('dash')" class="nav-item active flex flex-col items-center gap-1">
            <i data-lucide="layout-dashboard" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Stats</span>
        </button>
        <button onclick="switchTab('coach')" class="nav-item flex flex-col items-center gap-1">
            <i data-lucide="bot" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Coach</span>
        </button>
        <button onclick="switchTab('workout')" class="nav-item flex flex-col items-center gap-1">
            <i data-lucide="activity" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Plan</span>
        </button>
    </nav>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('tab-' + tabId).classList.add('tab-active');
            
            // Manage Active States
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            // This is a bit of a hack to find the button even if you click the icon inside it
            event.currentTarget.closest('button').classList.add('active');
        }

        // --- Keep your existing JavaScript Logic (askCoach, previewImage, Chart, etc.) here ---
    </script>
</body>
</html>
