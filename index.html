<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT 90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; height: 100vh; overflow: hidden; margin:0; display:flex; flex-direction:column; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display:none; flex-grow:1; overflow-y:auto; padding-bottom: 120px; }
        .active { display: flex !important; }
        .nav-btn.active { color: #a78bfa; }
    </style>
</head>
<body class="safe-area-inset">

    <header class="p-6 flex justify-between items-center bg-slate-950/80 border-b border-white/5">
        <h1 class="text-xl font-black italic text-violet-500 uppercase tracking-tighter">Project 90</h1>
        <div id="weight-display" onclick="openWeight()" class="text-right cursor-pointer">
            <span class="text-2xl font-black" id="cur-weight">0.0</span><span class="text-xs text-slate-500 ml-1 uppercase">kg</span>
        </div>
    </header>

    <main class="flex-grow relative overflow-hidden">
        <div id="tab-dash" class="tab-content active flex-col p-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-4 rounded-3xl"><p class="text-[10px] uppercase font-bold text-slate-500">Intake</p><p class="text-2xl font-black text-emerald-400" id="stat-in">0</p></div>
                <div class="glass p-4 rounded-3xl"><p class="text-[10px] uppercase font-bold text-slate-500">Burned</p><p class="text-2xl font-black text-orange-400" id="stat-out">0</p></div>
            </div>
            <div class="glass p-4 rounded-3xl h-64"><canvas id="mainChart"></canvas></div>
        </div>

        <div id="tab-coach" class="tab-content flex-col h-full">
            <div id="chat-box" class="flex-grow p-6 space-y-4 overflow-y-auto"></div>
            <div class="p-4 glass border-t border-white/5 bg-slate-900/90 mb-20">
                <div class="flex gap-2 max-w-md mx-auto">
                    <input id="user-input" type="text" placeholder="I ate... / I ran..." class="flex-grow bg-slate-950 border border-slate-800 rounded-2xl px-4 text-sm outline-none focus:border-violet-500">
                    <button onclick="askCoach()" class="bg-violet-600 p-3 rounded-2xl active:scale-95"><i data-lucide="send" class="w-5 h-5"></i></button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content flex-col p-6 space-y-4">
            <h2 class="text-sm font-bold uppercase text-slate-500 tracking-widest">Today's Tasks</h2>
            <div id="plan-list" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-white/10 p-4 pb-8 flex justify-around z-50">
        <button onclick="showTab('dash', this)" class="nav-btn active flex flex-col items-center gap-1"><i data-lucide="layout-grid"></i><span class="text-[9px] uppercase font-bold">Stats</span></button>
        <button onclick="showTab('coach', this)" class="nav-btn flex flex-col items-center gap-1"><i data-lucide="message-square"></i><span class="text-[9px] uppercase font-bold">Coach</span></button>
        <button onclick="showTab('plan', this)" class="nav-btn flex flex-col items-center gap-1"><i data-lucide="check-square"></i><span class="text-[9px] uppercase font-bold">Plan</span></button>
    </nav>

    <script>
        lucide.createIcons();
        let state = JSON.parse(localStorage.getItem('p90_state')) || { in: 0, out: 0, weights: [100.0], plan: [] };

        function save() { 
            localStorage.setItem('p90_state', JSON.stringify(state)); 
            updateUI(); 
        }

        function updateUI() {
            document.getElementById('stat-in').innerText = state.in;
            document.getElementById('stat-out').innerText = state.out;
            document.getElementById('cur-weight').innerText = state.weights[state.weights.length-1].toFixed(1);
            
            const list = document.getElementById('plan-list');
            list.innerHTML = state.plan.map((item, i) => `
                <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 ${item.done ? 'border-emerald-500 opacity-40' : 'border-violet-500'}">
                    <div><p class="font-bold text-sm">${item.task}</p><p class="text-[10px] text-slate-500">${item.kcal} KCAL</p></div>
                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleItem(${i})" class="w-6 h-6 rounded-lg accent-violet-500">
                </div>
            `).join('');
            chart.update();
        }

        function toggleItem(i) {
            state.plan[i].done = !state.plan[i].done;
            state.out += state.plan[i].done ? state.plan[i].kcal : -state.plan[i].kcal;
            save();
        }

        async function askCoach() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg) return;
            
            addMsg(msg, 'user');
            input.value = '';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, weight: state.weights[state.weights.length-1] })
                });
                const data = await res.json();
                
                // Silent Logic Updates
                if(data.calories_in) state.in += data.calories_in;
                if(data.calories_out) state.out += data.calories_out;
                if(data.add_to_plan) state.plan.push({...data.add_to_plan, done: false});
                
                save();
                addMsg(data.reply, 'ai', data.macros);
            } catch(e) { addMsg("Coach connection lost.", 'ai'); }
        }

        function addMsg(t, type, sub="") {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = type === 'user' ? "ml-auto bg-violet-600 p-4 rounded-2xl max-w-[80%] text-sm" : "glass p-4 rounded-2xl max-w-[80%] text-sm";
            div.innerHTML = `<p>${t}</p>${sub ? `<p class="text-[10px] mt-2 text-slate-400 font-mono">${sub}</p>` : ""}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        function showTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            btn.classList.add('active');
        }

        const ctx = document.getElementById('mainChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['Today'], datasets: [{ label: 'In', data: [state.in], backgroundColor: '#10b981' }, { label: 'Out', data: [state.out], backgroundColor: '#f97316' }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });

        function openWeight() {
            const w = prompt("Current Weight (kg):", state.weights[state.weights.length-1]);
            if(w) { state.weights.push(parseFloat(w)); save(); }
        }

        updateUI();
    </script>
</body>
</html>
