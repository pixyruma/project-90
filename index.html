<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PROJECT 90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 200px; }
        .active { display: flex !important; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xl font-bold italic text-violet-500 uppercase">P90</h1>
        <div onclick="setWeight()" class="text-right cursor-pointer">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Weight</p>
            <p class="text-xl font-black" id="weight-val">0.0</p>
        </div>
    </header>

    <main class="flex-1 relative overflow-hidden">
        <div id="tab-dash" class="tab-content active p-6 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-3xl text-center"><p class="text-xs text-slate-500 uppercase">In</p><p id="in-val" class="text-2xl font-bold text-emerald-400">0</p></div>
                <div class="glass p-5 rounded-3xl text-center"><p class="text-xs text-slate-500 uppercase">Out</p><p id="out-val" class="text-2xl font-bold text-orange-400">0</p></div>
            </div>
            <div class="glass p-4 rounded-3xl h-64"><canvas id="chart"></canvas></div>
        </div>

        <div id="tab-coach" class="tab-content h-full">
            <div id="chat" class="flex-1 p-5 space-y-4 overflow-y-auto"></div>
            <div class="fixed bottom-24 left-0 right-0 p-4">
                <div class="flex gap-2 max-w-md mx-auto glass p-2 rounded-2xl">
                    <input type="file" id="cam" class="hidden" onchange="handleImg(this)" accept="image/*">
                    <button onclick="document.getElementById('cam').click()" class="p-3 text-slate-400"><i data-lucide="camera"></i></button>
                    <input id="in" type="text" onkeydown="if(event.key==='Enter') send()" placeholder="Log food or run..." class="flex-1 bg-transparent outline-none text-sm">
                    <button onclick="send()" class="bg-violet-600 p-3 rounded-xl"><i data-lucide="send" class="w-5 h-5 text-white"></i></button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content p-6 space-y-4">
            <h2 class="font-bold text-slate-500 uppercase text-xs">Daily Tasks</h2>
            <div id="plan-list" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full glass border-t border-white/10 p-4 pb-8 flex justify-around">
        <button onclick="tab('dash')" class="flex flex-col items-center gap-1"><i data-lucide="bar-chart-2"></i></button>
        <button onclick="tab('coach')" class="flex flex-col items-center gap-1"><i data-lucide="message-circle"></i></button>
        <button onclick="tab('plan')" class="flex flex-col items-center gap-1"><i data-lucide="check-square"></i></button>
    </nav>

    <script>
        lucide.createIcons();
        let state = JSON.parse(localStorage.getItem('p90')) || { in: 0, out: 0, w: [100.0], plan: [] };
        let imgData = null;

        function save() {
            localStorage.setItem('p90', JSON.stringify(state));
            document.getElementById('in-val').innerText = state.in;
            document.getElementById('out-val').innerText = state.out;
            document.getElementById('weight-val').innerText = state.w[state.w.length-1];
            renderPlan();
            chart.update();
        }

        function renderPlan() {
            const list = document.getElementById('plan-list');
            list.innerHTML = state.plan.map((p, i) => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center ${p.done ? 'opacity-40 border-emerald-500' : ''}">
                    <div><p class="font-bold text-sm">${p.task}</p><p class="text-[10px] text-slate-400">${p.kcal} kcal</p></div>
                    <input type="checkbox" ${p.done ? 'checked' : ''} onchange="toggle(${i})" class="w-6 h-6 rounded accent-violet-500">
                </div>
            `).join('');
        }

        function toggle(i) {
            state.plan[i].done = !state.plan[i].done;
            state.out += state.plan[i].done ? state.plan[i].kcal : -state.plan[i].kcal;
            save();
        }

        async function send() {
            const input = document.getElementById('in');
            const msg = input.value;
            if(!msg && !imgData) return;
            addMsg(msg || "Analyzing image...", 'user');
            input.value = '';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: msg, weight: state.w[state.w.length-1], image: imgData })
                });
                const data = await res.json();
                let txt = data.reply;

                // DATA EXTRACTION
                const block = txt.match(/---DATA---([\s\S]*?)----------/);
                if(block) {
                    const content = block[1];
                    const inK = content.match(/IN:\s*(\d+)/);
                    const outK = content.match(/OUT:\s*(\d+)/);
                    const pK = content.match(/PLAN:\s*([^|]+)\|\s*(\d+)/);

                    if(inK) state.in += parseInt(inK[1]);
                    if(outK) state.out += parseInt(outK[1]);
                    if(pK) state.plan.push({ task: pK[1].trim(), kcal: parseInt(pK[2]), done: false });
                    
                    txt = txt.replace(/---DATA---[\s\S]*?----------/, "").trim();
                }

                save();
                addMsg(txt || "Logged.", 'ai');
                imgData = null;
            } catch(e) { addMsg("Connection error.", 'ai'); }
        }

        function addMsg(t, s) {
            const chat = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = s === 'user' ? "ml-auto bg-violet-600 p-3 rounded-2xl max-w-[80%] text-sm" : "glass p-3 rounded-2xl max-w-[80%] text-sm";
            d.innerText = t;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
        }

        function handleImg(i) {
            const f = i.files[0];
            const r = new FileReader();
            r.onload = (e) => imgData = e.target.result.split(',')[1];
            r.readAsDataURL(f);
        }

        const chart = new Chart(document.getElementById('chart'), {
            type: 'bar',
            data: { labels: ['Today'], datasets: [{label:'In', data:[state.in], backgroundColor:'#10b981'}, {label:'Out', data:[state.out], backgroundColor:'#f97316'}] },
            options: { responsive:true, maintainAspectRatio:false, scales: { y:{display:false}, x:{grid:{display:false}} }, plugins:{legend:{display:false}} }
        });

        function setWeight() {
            const w = prompt("Weight:", state.w[state.w.length-1]);
            if(w) { state.w.push(parseFloat(w)); save(); }
        }

        save();
    </script>
</body>
</html>
