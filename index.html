<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT 90 | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .btn-action { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.25rem; padding: 1.25rem 0.5rem; transition: all 0.2s ease; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; }
        .btn-action:active { transform: scale(0.92); filter: brightness(1.2); }
        .bg-violet-gradient { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); box-shadow: 0 10px 25px -5px rgba(109, 40, 217, 0.4); }
        .bg-emerald-gradient { background: linear-gradient(135deg, #10b981 0%, #047857 100%); box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4); }
        .bg-blue-gradient { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4); }
        .loading-dots::after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 40% { color: white; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .25em 0 0 white, .5em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; } }
    </style>
</head>
<body class="p-5 max-w-md mx-auto">

    <header class="flex justify-between items-start mb-6 pt-4">
        <div>
            <h1 class="text-3xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-violet-500 uppercase tracking-tighter">Project 90</h1>
            <p class="text-[10px] font-black text-slate-500 tracking-widest mt-1 uppercase">41 YRS • 185CM • MALE</p>
        </div>
        <div class="bg-slate-800/80 px-3 py-1.5 rounded-xl border border-slate-700 font-black text-[10px] text-blue-400 uppercase">Target 90kg</div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-8 text-center">
        <div class="glass-card p-5">
            <p class="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest">Weight</p>
            <div class="flex items-end justify-center gap-1">
                <span id="display-weight" class="text-3xl font-black text-white">100.0</span>
                <span class="text-xs text-slate-500 mb-1 font-bold italic">KG</span>
            </div>
        </div>
        <div class="glass-card p-5">
            <p class="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest">Calories</p>
            <div class="flex items-end justify-center gap-1">
                <span id="display-cals" class="text-3xl font-black text-emerald-400">0</span>
                <span class="text-xs text-slate-500 mb-1 font-bold italic">KCAL</span>
            </div>
        </div>
    </div>

    <div class="mb-8 grid grid-cols-3 gap-4">
        <button onclick="logRun()" class="btn-action bg-violet-gradient"><span class="text-2xl mb-1">🏃‍♂️</span><span class="text-[10px] font-black uppercase">Run</span></button>
        <button onclick="logMeal()" class="btn-action bg-emerald-gradient"><span class="text-2xl mb-1">🥗</span><span class="text-[10px] font-black uppercase">Meal</span></button>
        <button onclick="logWeight()" class="btn-action bg-blue-gradient"><span class="text-2xl mb-1">⚖️</span><span class="text-[10px] font-black uppercase">Weight</span></button>
    </div>

    <div class="glass-card flex flex-col flex-1 max-h-[400px] overflow-hidden mb-4">
        <div class="px-5 py-3 border-b border-white/5 flex items-center justify-between bg-white/5">
            <span class="text-[10px] font-black text-slate-300 tracking-widest uppercase italic">Coach Gemini</span>
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto p-5 text-sm space-y-4">
            <div class="bg-slate-800/60 p-3 rounded-2xl rounded-tl-none border border-white/5 text-slate-200">System online. Goal 90kg verified. Let's work.</div>
        </div>
        <div class="p-4 bg-slate-900/80 border-t border-white/5">
            <div class="flex gap-2">
                <input id="user-input" type="text" placeholder="Talk to coach..." onkeypress="if(event.key==='Enter') askCoach()" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-violet-500 text-white">
                <button onclick="askCoach()" class="bg-violet-600 w-12 rounded-xl flex items-center justify-center active:scale-90"><span class="font-bold text-white">➔</span></button>
            </div>
        </div>
    </div>

    <script>
        let weight = 100.0;
        let calories = 0;

        function logRun() { const d = prompt("Distance (km)?"); if (d) addMessage(`Logged ${d}km run. 🔥`, 'ai'); }
        function logMeal() { 
            const m = prompt("Meal name?"); 
            const c = prompt("Calories?"); 
            if (c) { calories += parseInt(c); document.getElementById('display-cals').innerText = calories; addMessage(`Logged ${m} (+${c} kcal). 🥗`, 'ai'); } 
        }
        function logWeight() { 
            const w = prompt("Current weight (kg)?"); 
            if (w && !isNaN(w)) { weight = parseFloat(w); document.getElementById('display-weight').innerText = weight.toFixed(1); addMessage(`New weight: ${weight}kg. ⚖️`, 'ai'); } 
        }

        function addMessage(t, s) {
            const b = document.getElementById('chat-box');
            const m = document.createElement('div');
            if (s === 'user') m.className = "bg-violet-600 p-3 rounded-2xl rounded-tr-none ml-auto max-w-[85%] text-white shadow-lg";
            else if (s === 'loading') { m.className = "bg-slate-800/60 p-3 rounded-2xl rounded-tl-none border border-white/5 text-slate-400 max-w-[85%] loading-dots"; m.id = "temp-loader"; m.innerText = "Coach is thinking"; }
            else m.className = "bg-slate-800/60 p-3 rounded-2xl rounded-tl-none border border-white/5 text-slate-200 max-w-[85%]";
            if(s !== 'loading') m.innerText = t;
            b.appendChild(m);
            b.scrollTop = b.scrollHeight;
        }

        async function askCoach() {
            const i = document.getElementById('user-input');
            const val = i.value.trim();
            if (!val) return;
            addMessage(val, 'user');
            i.value = '';
            addMessage("", 'loading');

            try {
                // Calling your Vercel Edge Function
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: val, weight: weight, calories: calories })
                });
                const data = await response.json();
                document.getElementById('temp-loader')?.remove();
                addMessage(data.reply || "Coach had an error.", 'ai');
            } catch (e) {
                document.getElementById('temp-loader')?.remove();
                addMessage("Connection timeout. Check Vercel logs.", 'ai');
            }
        }
    </script>
</body>
</html>
