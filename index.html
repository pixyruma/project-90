<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT 90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 240px; }
        .tab-active { display: flex !important; }
        .nav-item { transition: all 0.2s ease; color: #64748b; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #a78bfa; filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.3)); }
        .loading-dots::after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); } 40% { color: white; } 60% { text-shadow: .25em 0 0 white; } 80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; } }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center border-b border-white/5 bg-slate-950/50 shrink-0">
        <div>
            <h1 class="text-xl font-black italic text-violet-500 uppercase tracking-tighter">Project 90</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Evolution Tracker</p>
        </div>
        <button onclick="openWeightModal()" class="glass px-4 py-2 rounded-xl flex flex-col items-end active:scale-95 transition-all">
            <p class="text-[9px] font-black text-violet-400 uppercase tracking-widest">Current</p>
            <p class="text-lg font-black text-white leading-none"><span id="head-weight">100.0</span><span class="text-[10px] ml-0.5 text-slate-500 uppercase">kg</span></p>
        </button>
    </header>

    <main class="flex-1 overflow-hidden relative">
        <section id="tab-dash" class="tab-content tab-active p-5 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-3xl"><p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Cals In</p><p class="text-2xl font-black text-emerald-400" id="dash-cals">0</p></div>
                <div class="glass p-5 rounded-3xl"><p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Burned</p><p class="text-2xl font-black text-orange-400" id="dash-burn">0</p></div>
            </div>
            <div class="glass p-5 rounded-3xl h-52"><canvas id="statsChart"></canvas></div>
            <div class="glass p-5 rounded-3xl h-44"><p class="text-[10px] font-bold text-slate-500 uppercase mb-2 text-center">Weight Journey</p><canvas id="weightChart"></canvas></div>
        </section>

        <section id="tab-coach" class="tab-content flex-col h-full">
            <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
            <div class="fixed bottom-[90px] left-0 right-0 p-4 bg-slate-950/90 border-t border-white/5 z-40">
                <div id="image-preview-container" class="hidden mb-2 relative inline-block ml-4">
                    <img id="image-preview" src="" class="w-16 h-16 rounded-xl object-cover border-2 border-violet-500">
                    <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-red-500 rounded-full p-1"><i data-lucide="x" class="w-3 h-3 text-white"></i></button>
                </div>
                <div class="flex gap-2 max-w-md mx-auto">
                    <input type="file" id="image-input" accept="image/*" class="hidden" onchange="previewImage(this)">
                    <button onclick="document.getElementById('image-input').click()" class="glass min-w-[52px] h-12 rounded-xl flex items-center justify-center"><i data-lucide="camera" class="w-6 h-6 text-slate-400"></i></button>
                    <input id="user-input" type="text" placeholder="I ate..." onkeydown="if(event.key==='Enter') askCoach()" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 text-sm text-white focus:border-violet-500 outline-none">
                    <button onclick="askCoach()" class="bg-violet-600 min-w-[52px] h-12 rounded-xl flex items-center justify-center active:scale-90"><i data-lucide="send" class="w-5 h-5 text-white"></i></button>
                </div>
            </div>
        </section>

        <section id="tab-workout" class="tab-content p-5 space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-black italic uppercase text-violet-400">Active Plan</h2>
                <button onclick="undoLast()" class="text-[10px] font-bold text-red-400 uppercase border border-red-400/20 px-3 py-1 rounded-lg">Undo ↩</button>
            </div>
            <div class="space-y-3" id="plan-container"></div>
        </section>
    </main>

    <div id="weight-modal" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="glass w-full max-w-xs p-8 rounded-3xl text-center space-y-6">
            <h3 class="text-xs font-bold uppercase text-violet-400">Log Today's Weight</h3>
            <input id="weight-input" type="number" step="0.1" class="bg-transparent text-5xl font-black text-white text-center w-full outline-none border-b-2 border-violet-500 pb-2">
            <div class="flex gap-3"><button onclick="closeWeightModal()" class="flex-1 py-3 rounded-xl bg-slate-800 text-xs font-bold uppercase">Cancel</button><button onclick="saveWeight()" class="flex-1 py-3 rounded-xl bg-violet-600 text-xs font-bold uppercase">Save</button></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-4 pb-8 flex justify-around items-center z-50">
        <button onclick="switchTab('dash', this)" class="nav-item active"><i data-lucide="layout-dashboard"></i><span class="text-[9px] font-bold uppercase">Stats</span></button>
        <button onclick="switchTab('coach', this)" class="nav-item"><i data-lucide="bot"></i><span class="text-[9px] font-bold uppercase">Coach</span></button>
        <button onclick="switchTab('workout', this)" class="nav-item"><i data-lucide="activity"></i><span class="text-[9px] font-bold uppercase">Plan</span></button>
    </nav>

    <script>
        lucide.createIcons();
        let cIn = parseInt(localStorage.getItem('p90_cals')) || 0;
        let cOut = parseInt(localStorage.getItem('p90_burned')) || 0;
        let weightHistory = JSON.parse(localStorage.getItem('p90_weights')) || [100.0];
        let dailyPlan = JSON.parse(localStorage.getItem('p90_plan')) || [{id:1, task:"15m Walk", kcal:100, done:false}];
        let lastAction = null;
        let selectedImageData = null;

        function initUI() {
            document.getElementById('dash-cals').innerText = cIn;
            document.getElementById('dash-burn').innerText = cOut;
            document.getElementById('head-weight').innerText = weightHistory[weightHistory.length - 1].toFixed(1);
            renderPlan();
        }

        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('tab-active'));
            document.getElementById('tab-'+t).classList.add('tab-active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            lucide.createIcons();
        }

        function renderPlan() {
            const container = document.getElementById('plan-container');
            container.innerHTML = dailyPlan.map(i => `
                <div class="glass p-4 rounded-2xl flex items-center justify-between border-l-4 ${i.done ? 'border-emerald-500 opacity-50' : 'border-slate-700'}">
                    <div><p class="text-sm font-bold uppercase">${i.task}</p><p class="text-[9px] text-slate-500">${i.kcal} KCAL</p></div>
                    <input type="checkbox" ${i.done ? 'checked' : ''} onchange="togglePlanItem(${i.id}, ${i.kcal}, this)" class="w-6 h-6 rounded-lg accent-violet-500">
                </div>
            `).join('');
        }

        function togglePlanItem(id, kcal, checkbox) {
            const item = dailyPlan.find(p => p.id === id);
            item.done = checkbox.checked;
            cOut += item.done ? kcal : -kcal;
            saveAndSync();
            renderPlan();
        }

        // Replace your existing askCoach function with this:

async function askCoach() {
    const input = document.getElementById('user-input');
    const msg = input.value;
    if(!msg && !selectedImageData) return;
    
    addMessage(msg || "Analyzing...", 'user');
    input.value = '';
    const currentImg = selectedImageData;
    clearImage();
    addMessage("", 'loading');

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                message: msg, 
                weight: weightHistory[weightHistory.length-1], 
                image: currentImg 
            })
        });
        const data = await res.json();
        const replyText = data.reply;
        document.getElementById('temp-loader')?.remove();
        addMessage(replyText, 'ai');

        // 1. Calorie Intake (e.g. Estimated: 300 kcal)
        const inMatch = replyText.match(/Estimated:\s*(\d+)/i);
        if(inMatch) { 
            const amt = parseInt(inMatch[1]);
            cIn += amt; 
            lastAction = {type:'in', amount:amt}; 
        }
        
        // 2. Calorie Burned (e.g. Burned: 200 kcal)
        const outMatch = replyText.match(/Burned:\s*(\d+)/i);
        if(outMatch) { 
            const amt = parseInt(outMatch[1]);
            cOut += amt; 
            lastAction = {type:'out', amount:amt}; 
        }

        // 3. FIXED ADD_PLAN Regex: Catches tasks with numbers, dashes, and varied spacing
        const planMatch = replyText.match(/ADD_PLAN:\s*([^|]+)\|\s*(\d+)/i);
        if(planMatch) {
            const taskName = planMatch[1].trim();
            const taskKcal = parseInt(planMatch[2]);
            
            // Add to the local array
            dailyPlan.push({
                id: Date.now(),
                task: taskName,
                kcal: taskKcal,
                done: false
            });
            
            localStorage.setItem('p90_plan', JSON.stringify(dailyPlan));
            renderPlan();
            
            // Subtle notification
            addMessage(`Task "${taskName}" added to Plan.`, 'ai');
        }

        saveAndSync();
    } catch(e) { 
        document.getElementById('temp-loader')?.remove(); 
        addMessage("Connection glitch.", 'ai'); 
    }
}

        function undoLast() {
            if(!lastAction) return;
            if(lastAction.type === 'in') cIn -= lastAction.amount;
            if(lastAction.type === 'out') cOut -= lastAction.amount;
            lastAction = null;
            saveAndSync();
            addMessage("Reversed last log.", 'ai');
        }

        function saveAndSync() {
            localStorage.setItem('p90_cals', cIn);
            localStorage.setItem('p90_burned', cOut);
            document.getElementById('dash-cals').innerText = cIn;
            document.getElementById('dash-burn').innerText = cOut;
            updateCharts();
        }

        function saveWeight() {
            const val = parseFloat(document.getElementById('weight-input').value);
            if(val) {
                weightHistory.push(val);
                localStorage.setItem('p90_weights', JSON.stringify(weightHistory));
                document.getElementById('head-weight').innerText = val.toFixed(1);
                updateCharts();
                closeWeightModal();
            }
        }

        // CHARTS
        const statsCtx = document.getElementById('statsChart').getContext('2d');
        const statsChart = new Chart(statsCtx, { type: 'bar', data: { labels: ['M','T','W','T','F','S','S'], datasets: [{label:'In', data:[0,0,0,cIn,0,0,0], backgroundColor:'#10b981', borderRadius:4}, {label:'Out', data:[0,0,0,cOut,0,0,0], backgroundColor:'#f97316', borderRadius:4}] }, options: { responsive: true, maintainAspectRatio: false, scales: { y:{display:false}, x:{grid:{display:false}, ticks:{color:'#475569'}} }, plugins: { legend: { display: false } } } });
        
        const weightCtx = document.getElementById('weightChart').getContext('2d');
        const weightChart = new Chart(weightCtx, { type: 'line', data: { labels: weightHistory.map((_,i)=>'D'+(i+1)), datasets: [{data:weightHistory, borderColor:'#8b5cf6', borderWidth:2, tension:0.4, fill:true, backgroundColor:'rgba(139, 92, 246, 0.1)', pointRadius:0}] }, options: { responsive: true, maintainAspectRatio: false, scales: { y:{display:false}, x:{display:false} }, plugins: { legend: { display: false } } } });

        function updateCharts() {
            statsChart.data.datasets[0].data[3] = cIn;
            statsChart.data.datasets[1].data[3] = cOut;
            statsChart.update();
            weightChart.data.labels = weightHistory.map((_,i)=>'D'+(i+1));
            weightChart.data.datasets[0].data = weightHistory;
            weightChart.update();
        }

        function openWeightModal() { document.getElementById('weight-modal').classList.remove('hidden'); }
        function closeWeightModal() { document.getElementById('weight-modal').classList.add('hidden'); }
        function previewImage(i) { const file = i.files[0]; if(file) { const r = new FileReader(); r.onload = (e) => { selectedImageData = e.target.result.split(',')[1]; document.getElementById('image-preview').src = e.target.result; document.getElementById('image-preview-container').classList.remove('hidden'); }; r.readAsDataURL(file); } }
        function clearImage() { selectedImageData = null; document.getElementById('image-preview-container').classList.add('hidden'); }
        function addMessage(t, s) { const b = document.getElementById('chat-box'); const m = document.createElement('div'); if(s==='loading'){m.className="glass p-3 rounded-2xl text-slate-400 loading-dots text-sm"; m.id="temp-loader"; m.innerText="Thinking";} else {m.className=s==='user'?"bg-violet-600 p-3 rounded-2xl ml-auto max-w-[85%] text-white text-sm":"glass p-3 rounded-2xl text-slate-300 max-w-[85%] text-sm"; m.innerText=t;} b.appendChild(m); b.scrollTop=b.scrollHeight; }

        initUI();
    </script>
</body>
</html>
