<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT 90</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-content { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding-bottom: 220px; }
        .tab-active { display: flex !important; }
        .nav-item { transition: all 0.3s ease; color: #64748b; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: #a78bfa; filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.4)); }
        .loading-dots::after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
    </style>
</head>
<body>

    <header class="p-5 flex justify-between items-center border-b border-white/5 bg-slate-950/50 shrink-0">
        <h1 class="text-xl font-black italic text-violet-500 uppercase tracking-tighter">Project 90</h1>
        <div class="text-right"><p class="text-lg font-black text-white leading-tight">100.0<span class="text-[10px] ml-0.5 text-slate-500">KG</span></p></div>
    </header>

    <main class="flex-1 overflow-hidden relative">
        <section id="tab-dash" class="tab-content tab-active p-5 space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-3xl"><p class="text-[10px] text-slate-400 font-bold uppercase mb-1">In</p><p class="text-2xl font-black text-emerald-400" id="dash-cals">0</p></div>
                <div class="glass p-5 rounded-3xl"><p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Burned</p><p class="text-2xl font-black text-orange-400" id="dash-burn">0</p></div>
            </div>
            <div class="glass p-5 rounded-3xl h-64"><canvas id="statsChart"></canvas></div>
        </section>

        <section id="tab-coach" class="tab-content flex-col h-full">
            <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
            <div class="p-4 bg-slate-950/90 border-t border-white/5">
                <div class="flex gap-2 max-w-md mx-auto">
                    <input id="user-input" type="text" placeholder="I ate..." onkeydown="if(event.key==='Enter') askCoach()" class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 text-sm text-white outline-none">
                    <button onclick="askCoach()" class="bg-violet-600 w-12 h-12 rounded-xl flex items-center justify-center"><i data-lucide="send" class="w-5 h-5 text-white"></i></button>
                </div>
            </div>
        </section>

        <section id="tab-workout" class="tab-content p-5 space-y-4">
            <h2 class="text-xl font-black italic uppercase text-violet-400">Daily Plan</h2>
            <div class="space-y-3" id="plan-container">
                <div class="glass p-4 rounded-2xl flex items-center justify-between">
                    <div><p class="text-sm font-bold uppercase">15m Walk</p><p class="text-[9px] text-slate-500">100 KCAL</p></div>
                    <input type="checkbox" onchange="updateBurn(100, this)" class="w-6 h-6 rounded-lg accent-violet-500">
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 p-4 pb-8 flex justify-around items-center z-50">
        <button onclick="switchTab('dash', this)" class="nav-item active"><i data-lucide="layout-dashboard"></i><span class="text-[9px] font-black uppercase">Stats</span></button>
        <button onclick="switchTab('coach', this)" class="nav-item"><i data-lucide="bot"></i><span class="text-[9px] font-black uppercase">Coach</span></button>
        <button onclick="switchTab('workout', this)" class="nav-item"><i data-lucide="activity"></i><span class="text-[9px] font-black uppercase">Plan</span></button>
    </nav>

    <script>
        lucide.createIcons();
        let cIn = 0, cOut = 0;

        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('tab-'+id).classList.add('tab-active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            lucide.createIcons();
        }

        function updateBurn(amt, cb) {
            cOut += cb.checked ? amt : -amt;
            document.getElementById('dash-burn').innerText = cOut;
            updateChart();
        }

        async function askCoach() {
            const input = document.getElementById('user-input');
            const msg = input.value;
            if(!msg) return;
            input.value = '';
            
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                const data = await res.json();
                const m = document.createElement('div');
                m.className = "glass p-4 rounded-2xl text-sm text-slate-300";
                m.innerText = data.reply;
                document.getElementById('chat-box').appendChild(m);

                const inMatch = data.reply.match(/Estimated:\s*(\d+)/i);
                if(inMatch) { cIn += parseInt(inMatch[1]); document.getElementById('dash-cals').innerText = cIn; updateChart(); }
            } catch(e) {}
        }

        const ctx = document.getElementById('statsChart').getContext('2d');
        const statsChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['M','T','W','T','F','S','S'], datasets: [{data:[0,0,0,cIn,0,0,0], backgroundColor:'#10b981'}, {data:[0,0,0,cOut,0,0,0], backgroundColor:'#f97316'}] },
            options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{display:false},x:{grid:{display:false}}} }
        });

        function updateChart() {
            statsChart.data.datasets[0].data[3] = cIn;
            statsChart.data.datasets[1].data[3] = cOut;
            statsChart.update();
        }
    </script>
</body>
</html>
